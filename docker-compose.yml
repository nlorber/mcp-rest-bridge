services:
  mock-api:
    build: .
    command: ["node", "build/mock-api/server.js"]
    ports:
      - "3100:3100"
    environment:
      MOCK_API_PORT: "3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  mcp-server:
    build: .
    ports:
      - "3456:3456"
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3456"
      API_BASE_URL: http://mock-api:3100
      API_USERNAME: admin
      API_PASSWORD: admin123
      LOG_LEVEL: info
    depends_on:
      mock-api:
        condition: service_healthy
